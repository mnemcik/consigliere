<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="s5bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f0a"/>
      <stop offset="100%" style="stop-color:#2a1a0e"/>
    </linearGradient>
    <linearGradient id="s5gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a020"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <radialGradient id="s5glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d4a020;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#d4a020;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Dark warm background -->
  <circle cx="200" cy="200" r="185" fill="url(#s5bg)"/>
  <!-- Inner glow -->
  <circle cx="200" cy="195" r="100" fill="url(#s5glow)"/>
  <!-- Signet ring shape (octagon) -->
  <polygon points="200,60 280,100 320,180 320,220 280,300 200,340 120,300 80,220 80,180 120,100"
           fill="none" stroke="url(#s5gold)" stroke-width="2.5"/>
  <polygon points="200,80 268,114 304,184 304,216 268,286 200,320 132,286 96,216 96,184 132,114"
           fill="none" stroke="url(#s5gold)" stroke-width="0.8" opacity="0.3"/>
  <!-- Intertwined C and G -->
  <text x="200" y="220" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="100" font-weight="bold" fill="url(#s5gold)">CG</text>
  <!-- Small decorative elements at corners -->
  <circle cx="200" cy="60" r="4" fill="url(#s5gold)"/>
  <circle cx="200" cy="340" r="4" fill="url(#s5gold)"/>
  <circle cx="80" cy="200" r="4" fill="url(#s5gold)"/>
  <circle cx="320" cy="200" r="4" fill="url(#s5gold)"/>
  <!-- Subtitle outside the ring -->
  <text x="200" y="378" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" fill="#8a7a6a" letter-spacing="5">CONSIGLIERE</text>
</svg>
