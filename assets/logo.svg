<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2b714;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a227;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#shieldGrad)" filter="url(#shadow)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="url(#accentGrad)" stroke-width="3"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Shield shape -->
  <path d="M200 70 L310 130 L310 230 Q310 310 200 340 Q90 310 90 230 L90 130 Z"
        fill="none" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.6"/>

  <!-- CG monogram -->
  <text x="200" y="225" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="120" font-weight="bold" fill="url(#accentGrad)" letter-spacing="-4">
    CG
  </text>

  <!-- Subtitle -->
  <text x="200" y="275" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" fill="#8a8a9a" letter-spacing="6" text-transform="uppercase">
    CONSIGLIERE
  </text>

  <!-- Decorative line -->
  <line x1="130" y1="245" x2="270" y2="245" stroke="url(#accentGrad)" stroke-width="1" opacity="0.5"/>
</svg>
