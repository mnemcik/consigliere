<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="q3bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c2e"/>
      <stop offset="100%" style="stop-color:#2a1a3e"/>
    </linearGradient>
    <linearGradient id="q3gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c840"/>
      <stop offset="100%" style="stop-color:#d4a820"/>
    </linearGradient>
    <linearGradient id="q3silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c0c0d0"/>
      <stop offset="100%" style="stop-color:#9090a0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="200" cy="200" r="185" fill="url(#q3bg)"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="url(#q3gold)" stroke-width="1.5"/>
  <!-- Quill pen -->
  <g transform="translate(200, 195) rotate(-30)">
    <!-- Feather body -->
    <path d="M0,0 Q-15,-60 -8,-120 Q0,-140 8,-120 Q15,-60 0,0"
          fill="url(#q3silver)" opacity="0.9"/>
    <!-- Feather spine -->
    <line x1="0" y1="0" x2="0" y2="-120" stroke="url(#q3gold)" stroke-width="1.5"/>
    <!-- Feather barbs -->
    <path d="M0,-30 Q-20,-35 -12,-50" fill="none" stroke="url(#q3silver)" stroke-width="0.8" opacity="0.5"/>
    <path d="M0,-50 Q-22,-55 -14,-70" fill="none" stroke="url(#q3silver)" stroke-width="0.8" opacity="0.5"/>
    <path d="M0,-70 Q-18,-78 -10,-90" fill="none" stroke="url(#q3silver)" stroke-width="0.8" opacity="0.5"/>
    <path d="M0,-30 Q20,-35 12,-50" fill="none" stroke="url(#q3silver)" stroke-width="0.8" opacity="0.5"/>
    <path d="M0,-50 Q22,-55 14,-70" fill="none" stroke="url(#q3silver)" stroke-width="0.8" opacity="0.5"/>
    <path d="M0,-70 Q18,-78 10,-90" fill="none" stroke="url(#q3silver)" stroke-width="0.8" opacity="0.5"/>
    <!-- Nib -->
    <path d="M-3,0 L0,25 L3,0" fill="url(#q3gold)"/>
  </g>
  <!-- Ink flourish under the quill -->
  <path d="M185,220 Q200,235 220,225 Q240,215 255,225" fill="none" stroke="url(#q3gold)" stroke-width="1.5" opacity="0.6"/>
  <!-- Text -->
  <text x="200" y="295" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="36" font-weight="bold" fill="url(#q3gold)" letter-spacing="1">Consigliere</text>
  <!-- Tagline -->
  <text x="200" y="320" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="#7a7a9a" letter-spacing="4">TRUSTED COUNSEL</text>
</svg>
