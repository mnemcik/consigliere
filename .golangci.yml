version: "2"

run:
  timeout: 3m

linters:
  default: standard
  enable:
    - bodyclose
    - dupl
    - errname
    - errorlint
    - exhaustive
    - goconst
    - gocritic
    - gosec
    - misspell
    - noctx
    - prealloc
    - revive
    - unconvert
    - unparam
    - whitespace
  settings:
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: unexported-return
          disabled: true
    gosec:
      excludes:
        - G301
        - G304
        - G306
  exclusions:
    paths:
      - cmd/embed_templates

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
